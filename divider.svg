<svg width="900" height="20" viewBox="0 0 900 20" xmlns="http://www.w3.org/2000/svg">
  <style>
    .line {
      fill: none;
      stroke: #00FFD1;
      stroke-width: 2;
      stroke-dasharray: 450 450;
      animation: move 3s linear infinite;
    }
    .glow-line {
      fill: none;
      stroke: #0ea5e9;
      stroke-width: 6;
      stroke-dasharray: 450 450;
      animation: move 3s linear infinite;
      opacity: 0.3;
      filter: blur(4px);
    }
    @keyframes move {
      0% { stroke-dashoffset: 900; }
      100% { stroke-dashoffset: 0; }
    }
  </style>
  <line x1="0" y1="10" x2="900" y2="10" class="glow-line" />
  <line x1="0" y1="10" x2="900" y2="10" class="line" />
</svg>
