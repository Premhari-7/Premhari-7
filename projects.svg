<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <style>
    .card-bg { fill: #0D1117; stroke: #30363D; stroke-width: 1; }
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 800; font-size: 16px; }
    .tech { font-family: Consolas, Monaco, "Courier New", monospace; font-size: 12px; fill: #8B949E; }
    .desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 13px; fill: #C9D1D9; }
    
    .card { animation: float 4s ease-in-out infinite; transform-origin: center; }
    .c1 { animation-delay: 0s; }
    .c2 { animation-delay: 0.5s; }
    .c3 { animation-delay: 1s; }
    .c4 { animation-delay: 1.5s; }
    .c5 { animation-delay: 2s; }
    .c6 { animation-delay: 2.5s; }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    
    @keyframes pulse {
      0% { filter: drop-shadow(0 0 2px rgba(255,255,255,0.2)); }
      100% { filter: drop-shadow(0 0 8px rgba(255,255,255,0.4)); }
    }
    .glow { animation: pulse 3s infinite alternate; }

    @media (prefers-color-scheme: light) {
      .card-bg { fill: #FFFFFF; stroke: #D0D7DE; }
      .desc { fill: #57606A; }
      .tech { fill: #0969DA; }
    }
  </style>

  <!-- Project 1 -->
  <g class="card c1 glow">
    <rect x="15" y="15" width="415" height="135" rx="10" ry="10" class="card-bg" />
    <rect x="15" y="15" width="8" height="135" fill="#00FFD1" rx="4" />
    <text x="40" y="45" class="title" fill="#00FFD1">01 NIHONGO LEARNING PLATFORM</text>
    <text x="40" y="70" class="tech">React Native • Expo • Node.js • MongoDB</text>
    <text x="40" y="100" class="desc">Full-stack JLPT exam prep Android app. AI samurai chatbot,</text>
    <text x="40" y="120" class="desc">animated certificates, push notifications &amp; progress tracking.</text>
  </g>

  <!-- Project 2 -->
  <g class="card c2 glow">
    <rect x="450" y="15" width="415" height="135" rx="10" ry="10" class="card-bg" />
    <rect x="450" y="15" width="8" height="135" fill="#0A66C2" rx="4" />
    <text x="475" y="45" class="title" fill="#0A66C2">02 MAATRAM ALUMNI CONNECT</text>
    <text x="475" y="70" class="tech">React • Node.js • MongoDB • Socket.io</text>
    <text x="475" y="100" class="desc">Alumni networking platform with role-based dashboards, event</text>
    <text x="475" y="120" class="desc">management and real-time activity feeds.</text>
  </g>

  <!-- Project 3 -->
  <g class="card c3 glow">
    <rect x="15" y="170" width="415" height="135" rx="10" ry="10" class="card-bg" />
    <rect x="15" y="170" width="8" height="135" fill="#27C93F" rx="4" />
    <text x="40" y="200" class="title" fill="#27C93F">03 PLANT DISEASE ANALYZER</text>
    <text x="40" y="225" class="tech">Python • TensorFlow • React • FastAPI</text>
    <text x="40" y="255" class="desc">AI-powered plant health detection with image recognition,</text>
    <text x="40" y="275" class="desc">disease classification and treatment suggestions.</text>
  </g>

  <!-- Project 4 -->
  <g class="card c4 glow">
    <rect x="450" y="170" width="415" height="135" rx="10" ry="10" class="card-bg" />
    <rect x="450" y="170" width="8" height="135" fill="#FF5F56" rx="4" />
    <text x="475" y="200" class="title" fill="#FF5F56">04 SMART PARKING SYSTEM</text>
    <text x="475" y="225" class="tech">MERN Stack • Socket.io • IoT • Arduino</text>
    <text x="475" y="255" class="desc">Real-time IoT parking slot tracker with slot booking and</text>
    <text x="475" y="275" class="desc">live availability dashboard.</text>
  </g>

  <!-- Project 5 -->
  <g class="card c5 glow">
    <rect x="15" y="325" width="415" height="135" rx="10" ry="10" class="card-bg" />
    <rect x="15" y="325" width="8" height="135" fill="#FFBD2E" rx="4" />
    <text x="40" y="355" class="title" fill="#FFBD2E">05 SCENT BITE</text>
    <text x="40" y="380" class="tech">MERN Stack • Tailwind CSS • JWT</text>
    <text x="40" y="410" class="desc">Full-featured fragrance e-commerce with product filtering,</text>
    <text x="40" y="430" class="desc">cart management and JWT authentication.</text>
  </g>

  <!-- Project 6 -->
  <g class="card c6 glow">
    <rect x="450" y="325" width="415" height="135" rx="10" ry="10" class="card-bg" />
    <rect x="450" y="325" width="8" height="135" fill="#FF007F" rx="4" />
    <text x="475" y="355" class="title" fill="#FF007F">06 PERSONAL PORTFOLIO</text>
    <text x="475" y="380" class="tech">Next.js • Tailwind CSS • Framer Motion</text>
    <text x="475" y="410" class="desc">Interactive developer portfolio website with smooth 3D</text>
    <text x="475" y="430" class="desc">animations, custom SVGs, dark mode, and responsive design.</text>
  </g>
</svg>
