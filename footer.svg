<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: 28px;
      fill: #00FFD1;
      animation: float 4s ease-in-out infinite, glow 2s ease-in-out infinite alternate;
    }
    .subtext {
      font-family: Consolas, Monaco, "Courier New", monospace;
      font-size: 14px;
      fill: #8B949E;
      animation: fade 3s ease-in-out infinite alternate;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    @keyframes glow {
      0% { filter: drop-shadow(0 0 4px rgba(0,255,209,0.4)); }
      100% { filter: drop-shadow(0 0 15px rgba(14,165,233,0.8)); fill: #0ea5e9; }
    }
    @keyframes fade {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    
    @media (prefers-color-scheme: light) {
      .subtext { fill: #57606A; }
    }
  </style>
  <g class="title">
    <text x="450" y="60" text-anchor="middle">LET'S BUILD SOMETHING REAL</text>
  </g>
  <g class="subtext">
    <text x="450" y="110" text-anchor="middle">Prem Hari S • Sri Krishna Arts and Science College (SKASC) • Coimbatore, India</text>
  </g>
</svg>
